# Pre-commit hooks for the backend.
# Install once: `cd backend && poetry run pre-commit install`
# Run on all files: `poetry run pre-commit run --all-files`
#
# All hooks are scoped to `^backend/` so they never touch the AI team's files.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        files: ^backend/
      - id: end-of-file-fixer
        files: ^backend/
      - id: check-yaml
        files: ^backend/
      - id: check-toml
        files: ^backend/
      - id: check-added-large-files
        files: ^backend/
        args: ["--maxkb=500"]
      - id: check-merge-conflict
        files: ^backend/

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        files: ^backend/
        args: ["--fix"]
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'cd backend && poetry run mypy app/'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
