name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Poetry
        run: pipx install poetry==2.0.1
      - name: Configure Poetry virtualenv
        run: poetry config virtualenvs.in-project true
      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: ruff check
        run: poetry run ruff check .
      - name: ruff format check
        run: poetry run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pipx install poetry==2.0.1
      - run: poetry config virtualenvs.in-project true
      - uses: actions/cache@v4
        with:
          path: backend/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}
      - run: poetry install --no-interaction
      - name: mypy
        run: poetry run mypy app/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: little_signals
          POSTGRES_PASSWORD: dev_only_password
          POSTGRES_DB: little_signals_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U little_signals"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pipx install poetry==2.0.1
      - run: poetry config virtualenvs.in-project true
      - uses: actions/cache@v4
        with:
          path: backend/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}
      - run: poetry install --no-interaction
      - name: Bootstrap Postgres (test DB + TimescaleDB extension)
        run: ./scripts/ci-postgres-init.sh
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: little_signals
          PGPASSWORD: dev_only_password
      - name: Apply Alembic migrations to test DB
        run: |
          DATABASE_URL=postgresql+asyncpg://little_signals:dev_only_password@localhost:5432/little_signals_test \
            poetry run alembic upgrade head
      - name: Run pytest with coverage
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://little_signals:dev_only_password@localhost:5432/little_signals_test
        run: poetry run pytest --cov=app --cov-report=xml --cov-report=term
      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMUM_GREEN: 85
          MINIMUM_ORANGE: 70
          COVERAGE_PATH: backend/

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: little-signals-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: little-signals-backend:ci
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true
